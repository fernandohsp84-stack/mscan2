<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TESTE</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f0f2f5;}
.btn{display:block;width:100%;padding:18px;background:#005CA9;color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;margin:10px 0;-webkit-appearance:none;touch-action:manipulation;}
#p1{display:block;} #p2{display:none;}
.page{padding:20px;background:#fff;border-radius:12px;margin:10px 0;}
</style>
</head>
<body>
<div id="p1" class="page">
  <h2>PAGINA 1</h2>
  <p>Se este botao funcionar, o problema e no arquivo grande.</p>
  <button class="btn" ontouchstart="ir2();return false;" onclick="ir2()">IR PARA PAGINA 2</button>
</div>
<div id="p2" class="page">
  <h2>PAGINA 2 - FUNCIONOU!</h2>
  <p>O botao funcionou corretamente.</p>
  <button class="btn" ontouchstart="ir1();return false;" onclick="ir1()">VOLTAR PAGINA 1</button>
</div>
<script>
function ir2(){
  document.getElementById('p1').style.display='none';
  document.getElementById('p2').style.display='block';
  window.scrollTo(0,0);
}
function ir1(){
  document.getElementById('p2').style.display='none';
  document.getElementById('p1').style.display='block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
